name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Generate changelog
      id: changelog
      run: |
        # Extract version from tag
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
        # Generate changelog from git commits
        CHANGELOG=$(git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD)
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ steps.changelog.outputs.version }}
        body: |
          ## Changes in this Release
          
          ${{ steps.changelog.outputs.changelog }}
          
          ## Installation
          
          ### Docker
          ```bash
          docker pull estudaai/estudaai:${{ steps.changelog.outputs.version }}
          ```
          
          ### Source
          ```bash
          git clone https://github.com/estudaai/estudaai.git
          cd estudaai
          git checkout ${{ github.ref }}
          python setup.py
          ```
          
          ## Documentation
          
          - [Installation Guide](README.md#installation)
          - [Contributing Guide](CONTRIBUTING.md)
          - [Changelog](CHANGELOG.md)
          
          ## Support
          
          - [Issues](https://github.com/estudaai/estudaai/issues)
          - [Discussions](https://github.com/estudaai/estudaai/discussions)
          - [Documentation](https://estudaai.readthedocs.io)
        draft: false
        prerelease: false

  build-docker:
    needs: create-release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Extract version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          estudaai/estudaai:${{ steps.version.outputs.version }}
          estudaai/estudaai:latest
        platforms: linux/amd64,linux/arm64

  publish-pypi:
    needs: create-release
    runs-on: ubuntu-latest
    if: false  # Disabled for now
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: python -m build
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}

  notify:
    needs: [create-release, build-docker]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify Discord
      uses: Ilshidur/action-discord@master
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      with:
        args: |
          🚀 **EstudaAI v${{ github.ref_name }}** foi lançado!
          
          📦 **Docker**: `estudaai/estudaai:${{ github.ref_name }}`
          📚 **Documentação**: https://estudaai.readthedocs.io
          🐛 **Issues**: https://github.com/estudaai/estudaai/issues
          
          Obrigado a todos os contribuidores! 🙏
