# Default values for estudaai
replicaCount: 3

image:
  repository: estudaai
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: estudaai.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Django settings
django:
  secretKey: "your-secret-key-here"
  debug: false
  allowedHosts: "localhost,127.0.0.1,estudaai.example.com"
  
# Database settings
postgresql:
  enabled: true
  auth:
    postgresPassword: "postgres"
    database: "estudaai"
  primary:
    persistence:
      enabled: true
      size: 10Gi

# Redis settings
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 5Gi

# OpenAI settings
openai:
  apiKey: "your-openai-api-key-here"

# Monitoring
monitoring:
  enabled: false
  prometheus:
    enabled: false
  grafana:
    enabled: false

# Logging
logging:
  level: INFO
  format: json
