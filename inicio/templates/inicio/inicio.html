{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'inicio/css/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <img src="{% static 'inicio/imgs/ESTUDAAI.png' %}" alt="EstudaAI logo" class="logo-estudaai">
                <h2 class="brand-name">EstudaAI</h2>
                <p class="card-description">Digite suas credenciais para acessar sua conta</p>
            </div>
            
            <div class="card-content">
                <form id="loginForm" class="form">
                    <!-- CSRF Token (para Django) - necessário para que o cookie 'csrftoken' seja definido -->
                    {% csrf_token %}
                    
                    <!-- Alert de erro -->
                    <div id="errorAlert" class="alert alert-error" style="display: none;">
                        <svg class="alert-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <span id="errorMessage"></span>
                    </div>
                    
                    <!-- Campo de E-mail -->
                    <div class="form-group">
                        <label for="email" class="form-label">E-mail</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                            </svg>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                class="form-input" 
                                placeholder="seu@email.com" 
                                required
                            >
                        </div>
                    </div>
                    
                    <!-- Campo de Senha -->
                    <div class="form-group">
                        <div class="form-label-row">
                            <label for="password" class="form-label">Senha</label>
                            <a href="#" class="forgot-link">Esqueceu a senha?</a>
                        </div>
                        <div class="input-wrapper">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                class="form-input" 
                                placeholder="Digite sua senha" 
                                required
                            >
                            <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar senha">
                                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg id="eyeOffIcon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                                    <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                                    <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                                    <line x1="2" y1="2" x2="22" y2="22"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Botão de Submit -->
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <span id="btnText">Entrar</span>
                    </button>
                </form>
            </div>
            
            <div class="card-footer">
                <div class="divider">
                    <span class="divider-text">Ou</span>
                </div>
                <p class="signup-text">
                    Não tem uma conta? <a href="/cadastro/" class="signup-link">Cadastre-se</a>
                </p>
            </div>
        </div>
    </div>

    <script src="{% static 'inicio/java/login.js' %}"></script>
</body>
</html>
