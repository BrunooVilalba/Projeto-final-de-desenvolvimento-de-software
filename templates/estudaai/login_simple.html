<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EstudaAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0d1117; color: white; font-family: 'Inter', sans-serif; }
        .card { background: #161b22; border: 1px solid #30363d; }
        .form-control { background: #161b22; border: 1px solid #30363d; color: white; }
        .form-control:focus { background: #161b22; border-color: #00d4ff; color: white; box-shadow: 0 0 0 0.2rem rgba(0, 212, 255, 0.25); }
        .btn-primary { background: linear-gradient(135deg, #00d4ff, #0099cc); border: none; color: #000; }
        .btn-primary:hover { background: linear-gradient(135deg, #0099cc, #007acc); color: #000; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">Login EstudaAI</h2>
                        
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                        
                        <form method="post" action="{% url 'login' %}">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="username" class="form-label">Usuário</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Entrar</button>
                            </div>
                        </form>
                        
                        <div class="text-center mt-3">
                            <a href="{% url 'register' %}" class="text-decoration-none" style="color: #00d4ff;">Cadastrar-se</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
